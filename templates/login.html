{% extends "base.html" %}
{% block title %}Login - Cardiac Health AI{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.6)),
                    url('{{ url_for('static', filename='images/heart-bg.jpg') }}') center/cover no-repeat fixed;
        min-height: 100vh;
    }
    .navbar { background: rgba(0,0,0,0.5) !important; backdrop-filter: blur(10px); }
    .navbar .nav-link, .navbar-brand { color: white !important; }
    .login-hero { min-height: calc(100vh - 76px); display: flex; align-items: center; }
    .login-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .btn-login { background: linear-gradient(135deg, #dc3545, #c82333); }
</style>
{% endblock %}

{% block content %}
<section class="login-hero">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card login-card p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-heartbeat fa-4x text-danger"></i>
                        <h2 class="mt-3 fw-bold">Welcome Back</h2>
                        <p class="text-muted">Login to access your cardiac health dashboard</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" required>
                        </div>
                        <div class="mb-4">
                            <label>Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-login btn-lg w-100 text-white">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p>Don't have an account? <a href="{{ url_for('register') }}" class="text-danger fw-bold">Register</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        fetch('/login', { method: 'POST', body: formData })
        .then(res => {
            if (res.redirected) window.location.href = res.url;
            else return res.text().then(() => alert('Invalid credentials'));
        });
    });
</script>
{% endblock %}
